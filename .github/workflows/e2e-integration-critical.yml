name: E2E Integration Critical Suite (Nightly)

on:
  schedule:
    # Daily at 2 AM UTC (NON-BLOCKING, nightly run)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Manual trigger
  pull_request:
    branches: [main, develop]
    paths:
      - 'tests/e2e/integration_critical/**'
      - '.github/workflows/e2e-integration-critical.yml'

concurrency:
  group: e2e-integration-critical-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-critical-suite:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env (disables rate limiting for test suite)
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db
          SECRET_KEY=ci-integration-critical-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          ADMIN_NAME=CI Admin
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-xdist requests  # Test dependencies

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          SECRET_KEY: ci-integration-critical-key-not-for-production
        run: |
          alembic upgrade head

          # Verify migration state
          alembic current -v

      - name: Seed test data
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          SECRET_KEY: ci-integration-critical-key-not-for-production
        run: |
          python scripts/seed_tournament_types.py

      - name: Start FastAPI backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          SECRET_KEY: ci-integration-critical-key-not-for-production
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &

          # Wait up to 30s for the server to be ready (retry loop)
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl --fail http://localhost:8000/health || exit 1

      - name: Run Integration Critical Suite (Sequential)
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          SECRET_KEY: ci-integration-critical-key-not-for-production
        run: |
          PYTHONPATH=. pytest tests/e2e/integration_critical/ \
            -v \
            --tb=short \
            -ra \
            --durations=5

      - name: Run Integration Critical Suite (Parallel - HARD REQUIREMENT)
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          SECRET_KEY: ci-integration-critical-key-not-for-production
        run: |
          PYTHONPATH=. pytest tests/e2e/integration_critical/ \
            -n auto \
            -v \
            --tb=short \
            -ra \
            --durations=5

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-critical-screenshots
          path: tests/e2e/screenshots/*_FAILED.png
          retention-days: 7

      - name: Report test results
        if: always()
        run: |
          echo "Integration Critical Suite completed."
          echo "Note: Failures do NOT block PR merge (NON-BLOCKING policy)."
          echo "Review nightly summary for regression signals."
