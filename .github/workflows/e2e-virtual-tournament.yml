name: E2E Virtual Tournament (Phase 1 — session_type_config=virtual)

# Proves:
#   VT-01  _resolve_session_type() returns 'virtual' when session_type_config='virtual'
#   VT-02  _resolve_base_xp('virtual') == 50 (not 75)
#   VT-03  PATCH session_type_config after sessions_generated=True → 400
#   VT-04  Result submission on virtual session → 200 (no actual_start_time needed)
#   VT-05  GET /events/{id} renders 200 for virtual tournament (no crash)
#   SEED   8 Virtual Demo events seeded with all virtual sessions + meeting_links

on:
  push:
    branches: [main, develop, "feature/*", "fix/*"]
    paths:
      - 'app/services/tournament/session_generation/**'
      - 'app/models/tournament_configuration.py'
      - 'app/models/session.py'
      - 'app/api/api_v1/endpoints/sessions/results.py'
      - 'app/api/api_v1/endpoints/tournaments/lifecycle_updates.py'
      - 'app/api/web_routes/public_tournament.py'
      - 'alembic/versions/**'
      - 'scripts/seed_virtual_demo.py'
      - 'tests/integration/web_flows/test_virtual_tournament.py'
      - '.github/workflows/e2e-virtual-tournament.yml'
  pull_request:
    branches: [main]  # no path filter — runs on every PR to main
  workflow_dispatch:

concurrency:
  group: e2e-virtual-tournament-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system
  SECRET_KEY: ci-virtual-tournament-secret-not-for-production
  TESTING: "true"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: pytest VT-01..05 (SAVEPOINT-isolated, no seed dependency)
  # ───────────────────────────────────────────────────────────────────────────
  vt-pytest:
    name: "VT-01..05 — virtual tournament tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_intern_system
          SECRET_KEY=ci-virtual-tournament-secret-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          EOF

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Assert DB is empty
        run: |
          TABLE_COUNT=$(PGPASSWORD=postgres psql -h localhost -U postgres lfa_intern_system \
            -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public';" \
            | tr -d '[:space:]')
          echo "Tables before bootstrap: $TABLE_COUNT"
          if [ "$TABLE_COUNT" -ne "0" ]; then
            echo "❌ DB is not empty — $TABLE_COUNT tables found before bootstrap"
            exit 1
          fi
          echo "✅ DB is empty — clean start confirmed"

      - name: Bootstrap DB
        run: PYTHONPATH=. python scripts/bootstrap_clean.py

      - name: Validate seed state
        run: PYTHONPATH=. python scripts/validate_seed_state.py

      - name: Run VT tests
        run: |
          PYTHONPATH=. pytest tests/integration/web_flows/test_virtual_tournament.py \
            -v --tb=short -x

      - name: Write job summary
        if: always()
        run: |
          echo "## Virtual Tournament Tests (Phase 1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | What it proves |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| VT-01 | \`_resolve_session_type()\` returns \`'virtual'\` when config set |" >> $GITHUB_STEP_SUMMARY
          echo "| VT-02 | \`_resolve_base_xp('virtual')\` == 50 (not 75) |" >> $GITHUB_STEP_SUMMARY
          echo "| VT-03 | PATCH \`session_type_config\` after sessions generated → HTTP 400 |" >> $GITHUB_STEP_SUMMARY
          echo "| VT-04 | Result submission on virtual session → HTTP 200 (no \`actual_start_time\` needed) |" >> $GITHUB_STEP_SUMMARY
          echo "| VT-05 | \`GET /events/{id}\` returns 200 for virtual tournament (no crash) |" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: seed_virtual_demo.py + DB assertion
  # ───────────────────────────────────────────────────────────────────────────
  vt-seed:
    name: "Virtual Demo Seed — 8 events + DB assertion"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_intern_system
          SECRET_KEY=ci-virtual-tournament-secret-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          EOF

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Assert DB is empty
        run: |
          TABLE_COUNT=$(PGPASSWORD=postgres psql -h localhost -U postgres lfa_intern_system \
            -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public';" \
            | tr -d '[:space:]')
          echo "Tables before bootstrap: $TABLE_COUNT"
          if [ "$TABLE_COUNT" -ne "0" ]; then
            echo "❌ DB is not empty — $TABLE_COUNT tables found before bootstrap"
            exit 1
          fi
          echo "✅ DB is empty — clean start confirmed"

      - name: Bootstrap DB
        run: PYTHONPATH=. python scripts/bootstrap_clean.py

      - name: Validate seed state
        run: PYTHONPATH=. python scripts/validate_seed_state.py

      - name: Run seed_virtual_demo.py
        run: |
          PYTHONPATH=. python scripts/seed_virtual_demo.py 2>&1 | tee /tmp/seed_virtual_output.log
          echo "--- Seed output captured ---"

      - name: Grep check — 8 success lines
        run: |
          COUNT=$(grep -c "✅ Virtual Demo:" /tmp/seed_virtual_output.log || true)
          echo "Success lines found: $COUNT"
          if [ "$COUNT" -lt "8" ]; then
            echo "❌ Expected ≥8 '✅ Virtual Demo:' lines, got $COUNT"
            cat /tmp/seed_virtual_output.log
            exit 1
          fi
          echo "✅ Grep check passed: $COUNT success lines"

      - name: DB assertion — session_type, base_xp, meeting_link
        run: |
          PYTHONPATH=. TESTING=true python - <<'PYEOF'
          import os, sys
          os.environ.setdefault("DATABASE_URL", "postgresql://postgres:postgres@localhost:5432/lfa_intern_system")

          from app.database import SessionLocal
          from app.models.semester import Semester, SemesterStatus
          from app.models.session import Session as SessionModel, SessionType

          db = SessionLocal()
          issues = []

          virtual_tournaments = (
              db.query(Semester)
              .filter(Semester.name.like("Virtual Demo: %"))
              .all()
          )

          if len(virtual_tournaments) != 8:
              issues.append(f"Expected 8 Virtual Demo tournaments, got {len(virtual_tournaments)}")

          for t in virtual_tournaments:
              sessions = db.query(SessionModel).filter(SessionModel.semester_id == t.id).all()

              # VT-01 equivalent: all generated sessions must be virtual
              bad_type = [s.id for s in sessions if s.session_type != SessionType.virtual]
              if bad_type:
                  issues.append(f"{t.name}: sessions {bad_type} have wrong session_type (not virtual)")

              # VT-02 equivalent: base_xp must be 50 for virtual sessions
              bad_xp = [s.id for s in sessions if sessions and s.base_xp != 50]
              if bad_xp:
                  issues.append(f"{t.name}: sessions {bad_xp} have base_xp != 50")

              # meeting_link must be set for COMPLETED and REWARDS_DISTRIBUTED events
              if t.tournament_status in ("COMPLETED", "REWARDS_DISTRIBUTED"):
                  missing_link = [s.id for s in sessions if not s.meeting_link]
                  if missing_link:
                      issues.append(f"{t.name}: sessions {missing_link} missing meeting_link")

          db.close()

          if issues:
              print(f"\n❌ Virtual Demo DB assertion FAILED — {len(issues)} issue(s):")
              for iss in issues:
                  print(f"   • {iss}")
              sys.exit(1)

          print(f"\n✅ Virtual Demo DB assertion passed — {len(virtual_tournaments)} tournaments OK")
          for t in virtual_tournaments:
              print(f"   • {t.name}  [{t.tournament_status}]")
          PYEOF

      - name: Write job summary
        if: always()
        run: |
          echo "## Virtual Demo Seed Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Format | States |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| V-A: IR × INDIVIDUAL × virtual | DRAFT, IN_PROGRESS, COMPLETED, REWARDS_DISTRIBUTED |" >> $GITHUB_STEP_SUMMARY
          echo "| V-B: League × INDIVIDUAL × virtual | DRAFT, IN_PROGRESS, COMPLETED, REWARDS_DISTRIBUTED |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Assertions checked:** session_type=virtual, base_xp=50, meeting_link set on COMPLETED/REWARDS_DISTRIBUTED" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # Gate: fail if any upstream job failed
  # ───────────────────────────────────────────────────────────────────────────
  vt-gate:
    name: "Gate"
    runs-on: ubuntu-latest
    needs: [vt-pytest, vt-seed]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.vt-pytest.result }}" != "success" ]; then
            echo "❌ vt-pytest failed"
            exit 1
          fi
          if [ "${{ needs.vt-seed.result }}" != "success" ]; then
            echo "❌ vt-seed failed"
            exit 1
          fi
          echo "✅ All Virtual Tournament Phase 1 jobs passed"
