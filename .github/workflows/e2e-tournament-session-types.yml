name: E2E Tournament Session Types (virtual + hybrid)

# Proves:
#   TST-01  virtual tournament → enrolled_count > 0 in instructor sessions list
#   TST-02  hybrid tournament → enrolled_count > 0 in instructor sessions list
#   TST-03  virtual tournament → is_enrolled=True in student sessions list (SemesterEnrollment, no Booking)
#   TST-04  hybrid tournament → is_enrolled=True in student sessions list (SemesterEnrollment, no Booking)
#   TST-05  virtual tournament session_details → is_enrolled=True
#   TST-06  hybrid tournament session_details → is_enrolled=True
#   TST-07  virtual tournament session → meeting_link "Join Meeting" button visible
#   TST-08  hybrid tournament session → meeting_link "Join Meeting" button visible
#   TST-09  Admin PATCH session_type_config=virtual → cfg.session_type_config='virtual'
#   TST-10  Public event page → virtual tournament → '💻 Online' chip visible

on:
  push:
    branches: [main, develop, "feature/*", "fix/*"]
    paths:
      - 'app/services/tournament/session_generation/**'
      - 'app/services/tournament/validation.py'
      - 'app/api/web_routes/sessions.py'
      - 'app/api/web_routes/quiz.py'
      - 'app/api/web_routes/public_tournament.py'
      - 'app/api/api_v1/endpoints/tournaments/lifecycle_updates.py'
      - 'app/models/tournament_configuration.py'
      - 'app/models/semester_enrollment.py'
      - 'app/templates/admin/tournament_edit.html'
      - 'app/templates/admin/tournaments.html'
      - 'app/templates/public/tournament_detail.html'
      - 'alembic/versions/**'
      - 'tests/integration/web_flows/test_tournament_session_types.py'
      - '.github/workflows/e2e-tournament-session-types.yml'
  pull_request:
    branches: [main]  # no path filter — runs on every PR to main
  workflow_dispatch:

concurrency:
  group: e2e-tournament-session-types-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system
  SECRET_KEY: ci-tournament-session-types-secret-not-for-production
  TESTING: "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: pytest TST-01..10 (SAVEPOINT-isolated, no seed dependency)
  # ─────────────────────────────────────────────────────────────────────────────
  tst-pytest:
    name: "TST-01..10 — tournament virtual/hybrid session types"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_intern_system
          SECRET_KEY=ci-tournament-session-types-secret-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          EOF

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Assert DB is empty
        run: |
          TABLE_COUNT=$(PGPASSWORD=postgres psql -h localhost -U postgres lfa_intern_system \
            -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public';" \
            | tr -d '[:space:]')
          echo "Tables before bootstrap: $TABLE_COUNT"
          if [ "$TABLE_COUNT" -ne "0" ]; then
            echo "❌ DB is not empty — $TABLE_COUNT tables found before bootstrap"
            exit 1
          fi
          echo "✅ DB is empty — clean start confirmed"

      - name: Bootstrap DB
        run: PYTHONPATH=. python scripts/bootstrap_clean.py

      - name: Validate seed state
        run: PYTHONPATH=. python scripts/validate_seed_state.py

      - name: Run TST tests
        run: |
          PYTHONPATH=. pytest tests/integration/web_flows/test_tournament_session_types.py \
            -v --tb=short -x

      - name: Write job summary
        if: always()
        run: |
          echo "## Tournament Session Types Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | What it proves |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| TST-01 | Virtual tournament → enrolled_count > 0 in instructor sessions list |" >> $GITHUB_STEP_SUMMARY
          echo "| TST-02 | Hybrid tournament → enrolled_count > 0 in instructor sessions list |" >> $GITHUB_STEP_SUMMARY
          echo "| TST-03 | Virtual → student is_enrolled=True (SemesterEnrollment, no Booking) |" >> $GITHUB_STEP_SUMMARY
          echo "| TST-04 | Hybrid → student is_enrolled=True (SemesterEnrollment, no Booking) |" >> $GITHUB_STEP_SUMMARY
          echo "| TST-05 | Virtual session_details → is_enrolled=True |" >> $GITHUB_STEP_SUMMARY
          echo "| TST-06 | Hybrid session_details → is_enrolled=True |" >> $GITHUB_STEP_SUMMARY
          echo "| TST-07 | Virtual session → meeting_link 'Join Meeting' button visible |" >> $GITHUB_STEP_SUMMARY
          echo "| TST-08 | Hybrid session → meeting_link 'Join Meeting' button visible |" >> $GITHUB_STEP_SUMMARY
          echo "| TST-09 | Admin PATCH session_type_config=virtual → stored correctly |" >> $GITHUB_STEP_SUMMARY
          echo "| TST-10 | Public event page → virtual tournament → '💻 Online' chip |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate: fail if any upstream job failed
  # ─────────────────────────────────────────────────────────────────────────────
  tst-gate:
    name: "Gate"
    runs-on: ubuntu-latest
    needs: [tst-pytest]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.tst-pytest.result }}" != "success" ]; then
            echo "❌ tst-pytest failed"
            exit 1
          fi
          echo "✅ All Tournament Session Types jobs passed"
