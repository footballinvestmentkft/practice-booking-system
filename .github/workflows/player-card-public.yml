name: Player Card — Public Route, Theme & Variant Tests

on:
  pull_request:
    branches: [main, develop, "feature/*", "fix/*"]
    paths:
      - 'app/api/web_routes/public_player.py'
      - 'app/api/web_routes/dashboard.py'
      - 'app/services/card_theme_service.py'
      - 'app/services/card_variant_service.py'
      - 'app/models/license.py'
      - 'app/templates/public/player_card*.html'
      - 'app/templates/dashboard_student_new.html'
      - 'alembic/versions/2026_04_01_card_theme.py'
      - 'alembic/versions/2026_04_06_1900_add_card_variant_to_user_licenses.py'
      - 'alembic/versions/2026_04_07_1000_add_variant_photos_to_user_licenses.py'
      - 'alembic/versions/2026_04_07_1100_add_card_focus_points.py'
      - 'alembic/versions/2026_04_07_1200_add_compact_photo_position.py'
      - 'alembic/versions/2026_04_07_1300_add_variant_bg_photos.py'
      - 'app/services/player_photo_service.py'
      - 'tests/integration/web_flows/test_player_card_themes.py'
      - '.github/workflows/player-card-public.yml'
  workflow_dispatch:

concurrency:
  group: player-card-themes-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system
  SECRET_KEY: ci-player-card-secret-not-for-production

jobs:
  player-card-integration:
    name: "PC-01..04 — Public card route + theme apply/lock/arctic"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_intern_system
          SECRET_KEY=ci-player-card-secret-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          EOF

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Migrate DB
        run: alembic upgrade head

      - name: Verify card_theme + card_variant migration schema
        run: |
          python - <<'PYEOF'
          import os, psycopg2
          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          cur = conn.cursor()
          cur.execute("""
            SELECT column_name FROM information_schema.columns
            WHERE table_name='user_licenses'
            AND column_name IN (
              'card_theme', 'unlocked_card_themes',
              'card_variant', 'unlocked_card_variants',
              'card_bg_compact_url', 'card_bg_showcase_url'
            )
          """)
          cols = [r[0] for r in cur.fetchall()]
          assert 'card_theme' in cols, "card_theme column missing from user_licenses"
          assert 'unlocked_card_themes' in cols, "unlocked_card_themes column missing from user_licenses"
          assert 'card_variant' in cols, "card_variant column missing from user_licenses"
          assert 'unlocked_card_variants' in cols, "unlocked_card_variants column missing from user_licenses"
          assert 'card_bg_compact_url' in cols, "card_bg_compact_url column missing from user_licenses"
          assert 'card_bg_showcase_url' in cols, "card_bg_showcase_url column missing from user_licenses"
          conn.close()
          print("✅ Schema verified: card_theme/themes + card_variant/variants + bg_compact/showcase_url present in user_licenses")
          PYEOF

      - name: Static audit — variant templates must not query DB
        run: |
          VIOLATIONS=0
          for f in app/templates/public/player_card_compact.html \
                    app/templates/public/player_card_showcase.html \
                    app/templates/public/player_card_compact_bg.html \
                    app/templates/public/player_card_showcase_bg.html; do
            if [ -f "$f" ] && grep -qE "db\.query|db\.execute|SessionLocal" "$f"; then
              echo "❌ DB access found in variant template: $f"
              VIOLATIONS=$((VIOLATIONS+1))
            fi
          done
          if [ "$VIOLATIONS" -gt 0 ]; then exit 1; fi
          echo "✅ No DB queries in variant templates"

      - name: Static audit — base template contains token system
        run: |
          grep -q "\-\-card-body-bg" app/templates/public/player_card_base.html \
            && echo "✅ Token system present in player_card_base.html" \
            || (echo "❌ Token system missing from player_card_base.html" && exit 1)

      - name: Verify card_variant_service registry
        run: |
          python - <<'PYEOF'
          import sys; sys.path.insert(0, '.')
          from app.services.card_variant_service import VARIANTS, get_variant, VARIANT_ORDER
          assert set(VARIANT_ORDER) == set(VARIANTS.keys()), "VARIANT_ORDER must match VARIANTS keys"
          assert 'fifa' in VARIANTS, "Default 'fifa' variant must be in registry"
          assert not VARIANTS['fifa'].is_premium, "'fifa' must be free"
          assert VARIANTS['fifa'].available, "'fifa' must be available"
          fallback = get_variant('nonexistent_xyz')
          assert fallback.id == 'fifa', f"Fallback must be 'fifa', got: {fallback.id}"
          # All current variants must be available
          for vid in ('compact', 'showcase', 'compact_bg', 'showcase_bg'):
              assert VARIANTS[vid].available, f"{vid} must be available"
              assert VARIANTS[vid].is_premium, f"{vid} must be premium"
          # Credit costs
          assert VARIANTS['compact'].credit_cost == 300, "compact must cost 300 CR"
          assert VARIANTS['showcase'].credit_cost == 500, "showcase must cost 500 CR"
          assert VARIANTS['compact_bg'].credit_cost == 400, "compact_bg must cost 400 CR"
          assert VARIANTS['showcase_bg'].credit_cost == 600, "showcase_bg must cost 600 CR"
          # Template paths
          assert VARIANTS['compact_bg'].template == 'public/player_card_compact_bg.html'
          assert VARIANTS['showcase_bg'].template == 'public/player_card_showcase_bg.html'
          print(f"✅ card_variant_service: {list(VARIANTS.keys())}, fallback=fifa, all variants available, costs OK")
          PYEOF

      - name: Run PC-01..04 integration tests
        run: |
          mkdir -p results
          PYTHONPATH=. pytest tests/integration/web_flows/test_player_card_themes.py \
            -v --tb=short \
            --junitxml=results/player-card-themes.xml

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-player-card-${{ github.run_id }}
          path: results/*.xml
          retention-days: 14

  player-card-gate:
    name: "Player Card Feature Gate"
    runs-on: ubuntu-latest
    needs: [player-card-integration]
    if: always()

    steps:
      - name: Gate check
        run: |
          echo "## Player Card Theme + Variant Integration Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Covers | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PC-01 | GET /players/{uid}/card → 200 + fifa-left HTML | ${{ needs.player-card-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PC-02 | POST /dashboard/card-theme free theme → ok:true | ${{ needs.player-card-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PC-03 | POST /dashboard/card-theme locked premium → 400 | ${{ needs.player-card-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PC-04 | GET /players/{uid}/card arctic → body class=theme-arctic | ${{ needs.player-card-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PC-05 | GET /players/{uid}/card?preview=compact_bg → 200 | ${{ needs.player-card-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PC-06 | GET /players/{uid}/card?preview=showcase_bg → 200 | ${{ needs.player-card-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PC-07 | compact_bg + showcase_bg render with bg_url=None (no 500) | ${{ needs.player-card-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PC-08 | POST /dashboard/unlock-variant compact_bg → 400 CR deducted | ${{ needs.player-card-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PC-09 | POST /dashboard/card-variant compact_bg after unlock → ok:true | ${{ needs.player-card-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          RESULT="${{ needs.player-card-integration.result }}"
          if [ "$RESULT" = "success" ]; then
            echo "### ✅ Player Card tests PASSED — safe to merge" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Player Card gate FAILED — do not merge" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
