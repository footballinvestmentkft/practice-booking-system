  # ── Summary gate ────────────────────────────────────────────────────────────
  admin-menu-gate:
    name: "Admin Menu E2E Gate (NR-01..05 must all pass)"
    runs-on: ubuntu-latest
    needs: [admin-nav-dropdown, admin-pitches-page, admin-sport-directors-teams, admin-live-button]
    if: always()

    steps:
      - name: Gate check
        run: |
          echo "## Admin Menu Restructure E2E Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Covers | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| NR-01 Nav Dropdown | 6 groups, sub-links, active states, hover | ${{ needs.admin-nav-dropdown.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NR-02 Pitches | /admin/pitches: filter bar + data table | ${{ needs.admin-pitches-page.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NR-03 Sport Directors | /admin/sport-directors: assign form + table | ${{ needs.admin-sport-directors-teams.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NR-04 Teams | /admin/teams: tournament filter + table | ${{ needs.admin-sport-directors-teams.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NR-05 Live Button | IN_PROGRESS tournament → .btn-live visible | ${{ needs.admin-live-button.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 🎥 Artifacts: screenshots + videos uploaded per job (retention: 7 days)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          NAV="${{ needs.admin-nav-dropdown.result }}"
          PITCHES="${{ needs.admin-pitches-page.result }}"
          SD_TEAMS="${{ needs.admin-sport-directors-teams.result }}"
          LIVE="${{ needs.admin-live-button.result }}"

          if [ "$NAV" = "success" ] && [ "$PITCHES" = "success" ] && [ "$SD_TEAMS" = "success" ] && [ "$LIVE" = "success" ]; then
            echo "### ✅ All admin menu E2E tests PASSED — safe to merge" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Validated:**" >> $GITHUB_STEP_SUMMARY
            echo "- 🧭 Dropdown nav: 6 groups, correct sub-links, .active states, hover reveals" >> $GITHUB_STEP_SUMMARY
            echo "- 📍 /admin/pitches: renders with campus+location filter + data table" >> $GITHUB_STEP_SUMMARY
            echo "- 🏅 /admin/sport-directors: renders with assign form + assignments table" >> $GITHUB_STEP_SUMMARY
            echo "- 👥 /admin/teams: renders with tournament filter + teams table" >> $GITHUB_STEP_SUMMARY
            echo "- 📡 Live button: IN_PROGRESS tournament → .btn-live present in list" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Admin Menu E2E gate FAILED — do not merge" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Failing job(s):" >> $GITHUB_STEP_SUMMARY
            [ "$NAV" != "success" ]      && echo "- NR-01 Nav Dropdown: $NAV" >> $GITHUB_STEP_SUMMARY
            [ "$PITCHES" != "success" ]  && echo "- NR-02 Pitches: $PITCHES" >> $GITHUB_STEP_SUMMARY
            [ "$SD_TEAMS" != "success" ] && echo "- NR-03/NR-04 Sport Directors + Teams: $SD_TEAMS" >> $GITHUB_STEP_SUMMARY
            [ "$LIVE" != "success" ]     && echo "- NR-05 Live Button: $LIVE" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
