  # ── Job 4: NR-05 Live button on IN_PROGRESS tournament ─────────────────────
  admin-live-button:
    name: "NR-05 Live button on IN_PROGRESS tournament"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
