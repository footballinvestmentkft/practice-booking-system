name: E2E Admin Menu Restructure

on:
  pull_request:
    branches: [main, develop, "feature/*", "feat/*", "fix/*", "refactor/*"]
    paths:
      - 'app/**'
      - 'app/templates/admin/**'
      - 'app/static/css/admin.css'
      - 'tests/e2e/admin_ui/test_admin_menu_restructure.py'
      - '.github/workflows/e2e-admin-menu.yml'
  workflow_dispatch:

concurrency:
  group: e2e-admin-menu-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system
  SECRET_KEY: ci-admin-menu-e2e-secret-key-not-for-production
  API_URL: http://localhost:8000
  PYTEST_HEADLESS: "true"
  ADMIN_EMAIL: admin@lfa.com
  ADMIN_PASSWORD: admin123

jobs:
  # ── Job 1: NR-01 Nav dropdown structure ────────────────────────────────────
  admin-nav-dropdown:
    name: "NR-01 Nav Dropdown Structure (6 groups + active states)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_intern_system
          SECRET_KEY=ci-admin-menu-e2e-secret-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          ADMIN_NAME=CI Admin
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          python -m playwright install chromium

      - name: Run DB migrations
        run: alembic upgrade head

      - name: Seed test data
        run: |
          python scripts/seed_e2e_users.py
          python scripts/seed_8_physical_campuses.py
          python scripts/seed_tournament_types.py

      - name: Start backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'

      - name: NR-01 Nav Dropdown tests
        env:
          PLAYWRIGHT_VIDEO_DIR: test-results/videos/nav-dropdown
        run: |
          mkdir -p results test-results/videos/nav-dropdown
          PYTHONPATH=. pytest tests/e2e/admin_ui/test_admin_menu_restructure.py::TestNRNavDropdown \
            --junitxml=results/nr01_nav.xml \
            -v --tb=short -s

      - name: Upload artifacts (screenshots + videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-nav-dropdown-${{ github.run_id }}
          path: |
            tests/e2e/admin_ui/screenshots/
            test-results/videos/nav-dropdown/
          retention-days: 7

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-nr01-nav
          path: results/nr01_nav.xml

