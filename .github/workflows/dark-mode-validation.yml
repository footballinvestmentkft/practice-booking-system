name: Dark Mode CSS Validation (DM-STATIC-01..11 + DM-01..17)

on:
  push:
    branches: [main, develop, "feature/*", "fix/*"]
    paths:
      - 'app/static/css/**'
      - 'app/templates/base.html'
      - 'app/templates/admin/admin_base.html'
      - 'app/templates/student_base.html'
      - 'app/templates/achievements.html'
      - 'app/templates/progress.html'
      - 'app/templates/skills.html'
      - 'app/templates/calendar.html'
      - 'app/templates/sessions.html'
      - 'app/templates/admin/tournament_edit.html'
      - 'app/templates/admin/tournament_attendance.html'
      - 'app/templates/login.html'
      - 'app/templates/dashboard_student_new.html'
      - 'app/templates/dashboard_card_editor.html'
      - 'app/templates/includes/**'
      - 'scripts/validate_dark_mode_css.py'
      - 'tests/integration/web_flows/test_dark_mode_coverage.py'
      - '.github/workflows/dark-mode-validation.yml'
  pull_request:
    branches: [main]  # no path filter — runs on every PR to main
  workflow_dispatch:

concurrency:
  group: dark-mode-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system
  SECRET_KEY: ci-dark-mode-secret-not-for-production

# ── Job 1: Static filesystem audit — no DB needed (~30s) ─────────────────────
jobs:
  css-static-audit:
    name: "DM-STATIC-01..11 — CSS + HTML static checks"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run static CSS audit
        run: python scripts/validate_dark_mode_css.py

# ── Job 2: HTTP response audit — real DB + pytest ────────────────────────────
  http-response-audit:
    name: "DM-01..17 — HTTP response dark mode coverage"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_intern_system
          SECRET_KEY=ci-dark-mode-secret-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          EOF

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Migrate DB
        run: alembic upgrade head

      - name: Run DM-01..06 integration tests
        run: |
          mkdir -p results
          PYTHONPATH=. pytest tests/integration/web_flows/test_dark_mode_coverage.py \
            -v --tb=short \
            --junitxml=results/dark-mode-coverage.xml

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-dark-mode-${{ github.run_id }}
          path: results/*.xml
          retention-days: 14

# ── Gate: both jobs must pass ─────────────────────────────────────────────────
  dark-mode-gate:
    name: "Dark Mode Feature Gate"
    runs-on: ubuntu-latest
    needs: [css-static-audit, http-response-audit]
    if: always()

    steps:
      - name: Gate check
        run: |
          echo "## Dark Mode Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Checks | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| css-static-audit | DM-STATIC-01..11 (dark-mode.css exists, tokens, load order, no inline colors, no bg:white) | ${{ needs.css-static-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| http-response-audit | DM-01..17 (pages serve dark-mode.css, correct order, no inline white/grey) | ${{ needs.http-response-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CSS_RESULT="${{ needs.css-static-audit.result }}"
          HTTP_RESULT="${{ needs.http-response-audit.result }}"

          if [ "$CSS_RESULT" = "success" ] && [ "$HTTP_RESULT" = "success" ]; then
            echo "### ✅ All dark mode checks PASSED — safe to merge" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Dark mode gate FAILED — do not merge" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Fix the failing checks before merging. See job logs for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
