name: SCHED Regression Gate (mandatory)

# ── Fail-safe rule ─────────────────────────────────────────────────────────────
# "No green CI = no phase complete"
#
# This workflow is the MANDATORY merge gate for all scheduling-related changes.
# It runs the full @pytest.mark.sched suite, which includes:
#   - SCHED_G1-01..04  session generation + pitch conflict + delete guard
#   - SCHED_G2-01..02  admin UI + Cypress schedule page
#   - SCHED_G3-01..10  student enrollment + capacity + waitlist + audit + edge cases
#   - SCHED_INV-01..03 invariant smoke tests (credit / capacity / post-withdraw)
#
# Required branch protection (configure in GitHub → Settings → Branches → main):
#   - Require status checks to pass before merging: ✅ sched-regression
#   - Require branches to be up to date before merging: ✅
#
# Failures block merge. There are no exceptions.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/services/scheduling/**'
      - 'app/services/semester_service.py'
      - 'app/api/api_v1/endpoints/semesters/schedule_generator.py'
      - 'app/api/web_routes/admin.py'
      - 'app/api/web_routes/programs.py'
      - 'app/models/semester_schedule_config.py'
      - 'app/models/session.py'
      - 'app/templates/admin/semester_schedule.html'
      - 'app/templates/semester_enrollment_request.html'
      - 'tests/integration/web_flows/test_critical_e2e.py'
      - '.github/workflows/e2e-scheduling.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/services/scheduling/**'
      - 'app/services/semester_service.py'
      - 'app/api/api_v1/endpoints/semesters/schedule_generator.py'
      - 'app/api/web_routes/admin.py'
      - 'app/api/web_routes/programs.py'
      - 'app/models/semester_schedule_config.py'
      - 'app/models/session.py'
      - 'app/templates/admin/semester_schedule.html'
      - 'app/templates/semester_enrollment_request.html'
      - 'tests/integration/web_flows/test_critical_e2e.py'
      - '.github/workflows/e2e-scheduling.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'manual verification'

jobs:
  sched-regression:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db
          SECRET_KEY=ci-scheduling-gate-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          SECRET_KEY: ci-scheduling-gate-key-not-for-production
        run: alembic upgrade head

      - name: Start FastAPI backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          SECRET_KEY: ci-scheduling-gate-key-not-for-production
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -s http://localhost:8000/health > /dev/null 2>&1 && break
            sleep 1
          done
          curl --fail http://localhost:8000/health || exit 1

      - name: Run SCHED regression + invariant gate
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          SECRET_KEY: ci-scheduling-gate-key-not-for-production
        run: |
          PYTHONPATH=. pytest tests/integration/web_flows/test_critical_e2e.py \
            -m sched \
            -v --tb=short -ra --durations=5

      - name: Invariant gate summary
        if: always()
        run: |
          echo "──────────────────────────────────────────────────────"
          echo "SCHED regression gate completed."
          echo "Suite includes:"
          echo "  - SCHED_G1-01..04 (session generation)"
          echo "  - SCHED_G3-01..10 (enrollment + edge cases)"
          echo "  - SCHED_INV-01..03 (credit / capacity / post-withdraw invariants)"
          echo ""
          echo "MANDATORY: this workflow must be green before any merge."
          echo "Failures block merge — no exceptions."
          echo "──────────────────────────────────────────────────────"
