name: E2E Wizard Coverage

on:
  pull_request:
    branches: [ main, develop, "feature/*", "feat/*", "fix/*", "refactor/*" ]
    paths:
      - 'app/**'
      - 'tests/e2e/test_tournament_monitor*.py'
      - 'tests/e2e/test_full_boundary_matrix.py'
      - 'tests/e2e/test_knockout_matrix.py'
      - 'tests/e2e/test_p1_coverage.py'
  push:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      include_slow:
        description: 'Include @slow tests (256p, 512p, 1024p, league-32p)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ci-wizard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Jobs 1–3 removed: Wizard UI Flow / Coverage UI / Boundary Wizard UI ────
  # These three jobs tested the Streamlit wizard UI, decommissioned in Sprint 59h.
  # See archive/streamlit_app/ for history.

  # ── Job 1: API Boundary Tests (pure HTTP, no browser) ──────────────────────
  api-boundary:
    name: API Boundary Tests (127 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system
      SECRET_KEY: ci-test-secret-key-not-for-production
      API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Write .env (consistent settings for all subprocesses)
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_intern_system
          SECRET_KEY=ci-test-secret-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          ADMIN_NAME=CI Admin
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest pytest-playwright pytest-mock
          pip check
          python -m playwright install chromium

      - name: Run DB migrations
        run: alembic upgrade head

      - name: Seed test data
        run: |
          python scripts/seed_e2e_users.py
          python scripts/seed_8_physical_campuses.py
          python scripts/seed_tournament_types.py

      - name: Start backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'

      - name: API Boundary tests (non-slow)
        run: |
          cd tests/e2e
          pytest \
            test_tournament_monitor_coverage.py::TestPlayerCountBoundaryAPI \
            test_tournament_monitor_coverage.py::TestGroupKnockoutMatrix \
            test_tournament_monitor_coverage.py::TestPostLaunchObservability \
            test_full_boundary_matrix.py::TestKnockoutFullBVA \
            test_full_boundary_matrix.py::TestLeagueExtendedBVA \
            test_full_boundary_matrix.py::TestGroupKnockoutFullFormula \
            test_full_boundary_matrix.py::TestIndividualRankingExtendedBVA \
            test_full_boundary_matrix.py::TestGenerationValidatorBranchCoverage \
            test_full_boundary_matrix.py::TestTypeBoundaryMatrix \
            test_knockout_matrix.py \
            -m "not slow" \
            --junitxml=results/ci_api_boundary.xml \
            -v --tb=short

      - name: API Boundary tests (slow) — only on main or manual trigger
        if: github.ref == 'refs/heads/main' || github.event.inputs.include_slow == 'true'
        run: |
          cd tests/e2e
          pytest \
            test_full_boundary_matrix.py::TestKnockoutFullBVA \
            test_full_boundary_matrix.py::TestLeagueExtendedBVA \
            test_full_boundary_matrix.py::TestIndividualRankingExtendedBVA \
            test_full_boundary_matrix.py::TestTypeBoundaryMatrix \
            -m slow \
            --junitxml=results/ci_api_boundary_slow.xml \
            -v --tb=short

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-api-boundary
          path: tests/e2e/results/ci_api_boundary*.xml

  # ── Job 5: P1 Simulation API Coverage ─────────────────────────────────────
  # Runs the API-only subset of test_p1_coverage.py (14 of the original 23
  # tests). The 9 Playwright/Streamlit tests (TestWizardErrorStateRetention
  # and the 5 UI methods in TestIndividualRankingSafetyGate) are skipped
  # because the Streamlit wizard was decommissioned in Sprint 59h.
  p1-critical-coverage:
    name: P1 Simulation API Coverage (14 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system
      SECRET_KEY: ci-test-secret-key-not-for-production
      API_URL: http://localhost:8000
      PYTEST_HEADLESS: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Write .env (consistent settings for all subprocesses)
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_intern_system
          SECRET_KEY=ci-test-secret-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          ADMIN_NAME=CI Admin
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          # playwright package (no browser binary needed — API-only tests use Page as type hint only)
          pip install pytest pytest-playwright pytest-mock requests
          pip check

      - name: Run DB migrations
        run: alembic upgrade head

      - name: Seed test data
        run: |
          python scripts/seed_e2e_users.py
          python scripts/seed_8_physical_campuses.py
          python scripts/seed_tournament_types.py

      - name: Start FastAPI backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"; break
            fi
            sleep 1
          done
          curl --fail http://localhost:8000/health || exit 1

      - name: P1 Simulation API Coverage tests
        run: |
          cd tests/e2e
          pytest test_p1_coverage.py \
            -k "TestSimulationModeAPI or test_individual_ranking_128p_api" \
            --junitxml=results/ci_p1_coverage.xml \
            -v --tb=short

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-p1-coverage
          path: tests/e2e/results/ci_p1_coverage.xml

  # ── Summary job ────────────────────────────────────────────────────────────
  coverage-summary:
    name: E2E Coverage Summary
    runs-on: ubuntu-latest
    needs: [api-boundary, p1-critical-coverage]
    if: always()

    steps:
      - name: Coverage gate
        run: |
          echo "## E2E API Coverage Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Tests | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Boundary (non-slow) | 127 | ${{ needs.api-boundary.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| P1 Simulation API | 14 | ${{ needs.p1-critical-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          API="${{ needs.api-boundary.result }}"
          P1="${{ needs.p1-critical-coverage.result }}"

          if [ "$API" = "success" ] && [ "$P1" = "success" ]; then
            echo "### ✅ API coverage gate passed — safe to merge" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Coverage validated (141 tests):**" >> $GITHUB_STEP_SUMMARY
            echo "- Knockout / League / Group-Knockout / Individual Ranking types" >> $GITHUB_STEP_SUMMARY
            echo "- Boundary values: 2,3,4,7,8,15,16,31,32,63,64,127,128" >> $GITHUB_STEP_SUMMARY
            echo "- Post-launch observability: status, sessions, rankings, enrolled count" >> $GITHUB_STEP_SUMMARY
            echo "- Simulation modes: manual / auto_immediate / accelerated" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ E2E coverage gate FAILED — do not merge" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Failing job(s):" >> $GITHUB_STEP_SUMMARY
            [ "$API" != "success" ] && echo "- API Boundary: $API" >> $GITHUB_STEP_SUMMARY
            [ "$P1" != "success" ] && echo "- P1 Simulation API: $P1" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
