name: Test Baseline Check

on:
  pull_request:
    branches: [ main, develop, "feature/*", "feat/*", "fix/*", "refactor/*" ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:  # manual trigger via GitHub UI → Actions → Run workflow

# Concurrency control: Only 1 baseline pipeline per branch
# Prevents duplicate runs, ensures deterministic CI state
concurrency:
  group: ci-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: "Unit Tests (Baseline: 0 failed, 0 errors)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        pip install pytest pytest-mock
        pip check

    - name: Run DB migrations
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: alembic upgrade head

    - name: Run unit + integration tests with coverage
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        pytest tests/unit/ tests/database/ tests/integration/tournament/ tests/integration/web_flows/ tests/integration/domain/ tests/biometric/ \
          -q --tb=line -v \
          --cov=app \
          --cov-branch \
          --cov-report=term-missing \
          --cov-fail-under=85 \
          --durations=20

    - name: Run migration rollback tests (DDL round-trip)
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        # These tests perform actual downgrade/upgrade DDL — run separately
        # after the main suite. The autouse fixture always restores DB to head,
        # so subsequent steps (api_smoke, coverage) see a clean schema.
        pytest tests/integration/test_migration_rollback.py -v --tb=short

    - name: Run api_smoke tests (coverage append)
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        pytest tests/integration/api_smoke/ -q --tb=line \
          --cov=app \
          --cov-branch \
          --cov-append

    - name: Enforce coverage thresholds (stmt >= 88%, branch >= 80%, combined >= 85%)
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        python -m coverage xml -o coverage.xml
        python -m coverage report --show-missing --fail-under=85
        python .github/scripts/check_coverage.py

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report-combined
        path: coverage.xml
        retention-days: 30

    - name: Parse test results
      id: test-results
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        RESULTS=$(pytest tests/unit/ -q --tb=no \
          2>&1 | tail -1)
        echo "results=$RESULTS" >> $GITHUB_OUTPUT

        # Check for failures or errors
        if echo "$RESULTS" | grep -qE "[0-9]+ failed"; then
          echo "❌ Tests FAILED - merge blocked"
          exit 1
        fi
        if echo "$RESULTS" | grep -qE "[0-9]+ error"; then
          echo "❌ Tests have ERRORS - merge blocked"
          exit 1
        fi

        echo "✅ All tests passed - baseline maintained"

    - name: Baseline validation
      if: failure()
      run: |
        echo "::error::Test baseline violated. Required: 0 failed, 0 errors"
        echo "Current test suite must maintain 100% pass rate."
        echo "See test-infra-stable-baseline tag for reference."
        exit 1

  api-tests:
    name: "API Tests (Baseline: 0 failed, 0 errors)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system_test
