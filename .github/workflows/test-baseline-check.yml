        SECRET_KEY: test-secret-key-for-ci-only-not-production
        TESTING: "true"
      run: |
        uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        # Wait for FastAPI to finish startup (lifespan, scheduler init)
        for i in {1..45}; do
          if curl --fail --silent --max-time 2 http://localhost:8000/health > /dev/null 2>&1; then
            echo "✅ FastAPI ready after ${i} attempts"
            break
          fi
          if [ $i -eq 45 ]; then
            echo "❌ FastAPI failed to start after 45 attempts (90s)"
            exit 1
          fi
          sleep 2
        done

    - name: Run Payment Workflow Tests (Sequential - 0 flake requirement)
