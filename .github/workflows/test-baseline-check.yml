    needs: [unit-tests, smoke-tests, api-module-integrity, hardcoded-id-guard, credit-audit, security-gate, migration-integrity, migration-volume-test, payment-workflow-gate, core-access-gate, student-lifecycle-gate, instructor-lifecycle-gate, refund-workflow-gate, multi-campus-gate, session-management-gate, skill-assessment-lifecycle-gate, booking-lifecycle-gate, auth-lifecycle-gate, enrollment-workflow-gate, user-account-gate, instructor-assignment-lifecycle-gate, operational-smoke-test, cypress-web-admin, cypress-web-instructor, cypress-web-student, cypress-web-business, cypress-web-integration]
