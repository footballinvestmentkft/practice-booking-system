  migration-integrity:
    name: "Migration Chain Integrity (empty → head → base → head)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_migration_integrity_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Upgrade from empty database to head
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_migration_integrity_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        alembic upgrade head
        CURRENT=$(alembic current 2>&1)
        echo "After upgrade: $CURRENT"
        if ! echo "$CURRENT" | grep -q "(head)"; then
          echo "❌ Not at head after upgrade from empty DB"
          exit 1
        fi
        echo "✅ Empty → head: OK"

    - name: Full round-trip downgrade to base then upgrade to head
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_migration_integrity_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        alembic downgrade base
        echo "✅ Downgrade to base: OK"
        alembic upgrade head
        CURRENT=$(alembic current 2>&1)
        echo "After round-trip: $CURRENT"
        if ! echo "$CURRENT" | grep -q "(head)"; then
          echo "❌ Not at head after base → head round-trip"
          exit 1
        fi
        echo "✅ base → head round-trip: OK"

    - name: Verify DB constraints (uq_user_license_spec)
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_migration_integrity_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        python scripts/validate_db_constraints.py --exit-code
        echo "✅ DB constraints verified"

    - name: Migration chain failure annotation
      if: failure()
      run: |
        echo "::error::Migration chain integrity failed."
        echo "A migration may have broken references, invalid SQL, or missing dependency."
        echo "Run locally: alembic downgrade base && alembic upgrade head"
        exit 1

  migration-volume-test:
    # Validates that migrations run within acceptable time even when the
    # database already contains a production-like volume of rows.  Catches
    # migrations that are fast on an empty DB but would time out on real data
    # (e.g. missing index on a large table, full-table dedup scan, etc.).
    name: "Migration Volume Safety (data-present roundtrip)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_migration_volume_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run migrations on empty database
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_migration_volume_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        alembic upgrade head
        echo "✅ Empty → head: OK"

    - name: Seed production-like dataset (2 000 bookings, 500 reward rows)
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_migration_volume_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        python scripts/seed_volume_test.py
        echo "✅ Volume dataset seeded"

    - name: Verify index effectiveness on seeded data
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_migration_volume_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        # Check that the capacity-check query uses the composite index
        # EXPLAIN ANALYZE output must show Index Scan (not Seq Scan) on bookings
        python - <<'EOF'
        import os, sys
        from sqlalchemy import create_engine, text
        engine = create_engine(os.environ["DATABASE_URL"])
        with engine.connect() as conn:
            plan = conn.execute(text(
                "EXPLAIN ANALYZE SELECT COUNT(*) FROM bookings "
                "WHERE session_id = 1 AND status = 'CONFIRMED'"
            )).fetchall()
        plan_text = "\n".join(row[0] for row in plan)
        print(plan_text)
        # With the composite index present, PostgreSQL should choose an Index Scan
        if "Seq Scan on bookings" in plan_text and "rows=2000" not in plan_text:
            print("⚠️  Seq Scan detected — index may be missing or not selective enough")
        else:
            print("✅ Query plan is index-efficient")
        EOF

    - name: Downgrade one step then re-upgrade on data-present DB
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_migration_volume_test
        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        START_NS=$(date +%s%N)
        # alembic downgrade -1 is ambiguous at merge migration points (two parents).
        # Resolve the parent revision dynamically: handles both regular and merge heads.
        PREV=$(python3 scripts/get_prev_migration.py)
        echo "Downgrading to prev revision: $PREV"
        alembic downgrade "$PREV"
        alembic upgrade head
        END_NS=$(date +%s%N)
        ELAPSED_MS=$(( (END_NS - START_NS) / 1000000 ))
        echo "Migration roundtrip on seeded DB: ${ELAPSED_MS}ms"
        if [ "$ELAPSED_MS" -gt 30000 ]; then
          echo "::error::Migration roundtrip took ${ELAPSED_MS}ms (> 30s limit on seeded dataset)"
          exit 1
        fi
        echo "Migration roundtrip on seeded DB: ${ELAPSED_MS}ms (within 30s limit)"

    - name: Migration volume failure annotation
      if: failure()
      run: |
        echo "::error::Migration volume safety check failed."
        echo "A migration step may perform full-table scans or deduplication that"
        echo "degrades linearly with row count.  Add an index or batch the operation."
        exit 1

