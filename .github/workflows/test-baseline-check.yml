        SECRET_KEY: test-secret-key-for-ci-only-not-production
      run: |
        PYTHONPATH=. pytest tests/e2e/integration_critical/test_payment_workflow.py \
          -n auto \
          -v \
          --tb=short \
          -ra

    - name: Payment workflow gate failure
