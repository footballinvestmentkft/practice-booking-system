name: E2E Session Virtual Bugs (SBF-01..08)

# Proves:
#   SBF-01  passing_score=0.60 → template shows "60%" (not "6000%")
#   SBF-02  SemesterEnrollment (no Booking) → is_enrolled=True, no "Enrollment Required"
#   SBF-03  Virtual session with meeting_link → "💻 Meeting Link" shown
#   SBF-04  Virtual session without meeting_link → "TBA" under Meeting Link
#   SBF-05  SemesterEnrollment student → GET take_quiz → 200 (not 403)
#   SBF-06  SemesterEnrollment student → POST submit_quiz → 200 (not 403)
#   SBF-07  GET review?session_id=X → back link = /sessions/X
#   SBF-08  GET review (no session_id) → back link = /sessions (generic)

on:
  push:
    branches: [main, develop, "feature/*", "fix/*"]
    paths:
      - 'app/api/web_routes/sessions.py'
      - 'app/api/web_routes/quiz.py'
      - 'app/templates/session_details.html'
      - 'app/templates/quiz_attempt_review.html'
      - 'app/templates/quiz_result.html'
      - 'app/models/quiz.py'
      - 'scripts/seed_promo_event_demo.py'
      - 'tests/integration/web_flows/test_session_virtual_bugs.py'
      - '.github/workflows/e2e-session-virtual-bugs.yml'
  pull_request:
    branches: [main, develop, "feature/*", "fix/*"]
    paths:
      - 'app/api/web_routes/sessions.py'
      - 'app/api/web_routes/quiz.py'
      - 'app/templates/session_details.html'
      - 'app/templates/quiz_attempt_review.html'
      - 'app/templates/quiz_result.html'
      - 'app/models/quiz.py'
      - 'scripts/seed_promo_event_demo.py'
      - 'tests/integration/web_flows/test_session_virtual_bugs.py'
      - '.github/workflows/e2e-session-virtual-bugs.yml'
  workflow_dispatch:

concurrency:
  group: e2e-session-virtual-bugs-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system
  SECRET_KEY: ci-session-virtual-bugs-secret-not-for-production
  TESTING: "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: pytest SBF-01..04
  # ─────────────────────────────────────────────────────────────────────────────
  sbf-pytest:
    name: "SBF-01..08 — virtual session bug fix tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_intern_system
          SECRET_KEY=ci-session-virtual-bugs-secret-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          EOF

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Assert DB is empty
        run: |
          TABLE_COUNT=$(PGPASSWORD=postgres psql -h localhost -U postgres lfa_intern_system \
            -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public';" \
            | tr -d '[:space:]')
          echo "Tables before bootstrap: $TABLE_COUNT"
          if [ "$TABLE_COUNT" -ne "0" ]; then
            echo "❌ DB is not empty — $TABLE_COUNT tables found before bootstrap"
            exit 1
          fi
          echo "✅ DB is empty — clean start confirmed"

      - name: Bootstrap DB
        run: PYTHONPATH=. python scripts/bootstrap_clean.py

      - name: Validate seed state
        run: PYTHONPATH=. python scripts/validate_seed_state.py

      - name: Run SBF tests
        run: |
          PYTHONPATH=. pytest tests/integration/web_flows/test_session_virtual_bugs.py \
            -v --tb=short -x

      - name: Write job summary
        if: always()
        run: |
          echo "## Virtual Session Bug Fix Tests (SBF-01..08)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | What it proves |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| SBF-01 | \`passing_score=0.60\` displays as \`60%\` (not \`6000%\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| SBF-02 | SemesterEnrollment-only student sees quiz (no 'Enrollment Required') |" >> $GITHUB_STEP_SUMMARY
          echo "| SBF-03 | Virtual session with meeting_link shows '💻 Meeting Link' |" >> $GITHUB_STEP_SUMMARY
          echo "| SBF-04 | Virtual session without meeting_link shows 'TBA' under Meeting Link |" >> $GITHUB_STEP_SUMMARY
          echo "| SBF-05 | SemesterEnrollment student can GET take_quiz (not 403) |" >> $GITHUB_STEP_SUMMARY
          echo "| SBF-06 | SemesterEnrollment student can POST submit_quiz (not 403) |" >> $GITHUB_STEP_SUMMARY
          echo "| SBF-07 | review?session_id=X → back link = /sessions/X |" >> $GITHUB_STEP_SUMMARY
          echo "| SBF-08 | review (no session_id) → back link = /sessions (generic) |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate
  # ─────────────────────────────────────────────────────────────────────────────
  sbf-gate:
    name: "Gate"
    runs-on: ubuntu-latest
    needs: [sbf-pytest]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.sbf-pytest.result }}" != "success" ]; then
            echo "❌ sbf-pytest failed"
            exit 1
          fi
          echo "✅ All Virtual Session Bug Fix jobs passed (SBF-01..08)"
