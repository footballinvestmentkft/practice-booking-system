        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_intern_system
          SECRET_KEY=ci-team-e2e-secret-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          ADMIN_NAME=CI Admin
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          python -m playwright install chromium

      - name: Run DB migrations
        run: alembic upgrade head

      - name: Seed test data
        run: |
          python scripts/seed_e2e_users.py
          python scripts/seed_tournament_types.py

      - name: Start backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'

      - name: TM-03 (Admin bypass add member)
        env:
          PLAYWRIGHT_VIDEO_DIR: test-results/videos/admin
        run: |
          mkdir -p results test-results/videos/admin
          PYTHONPATH=. pytest tests/e2e/admin_ui/test_team_flow_e2e.py \
            -k "test_e2e_team_03_admin_bypass_add_member" \
            --junitxml=results/tm03.xml \
            -v --tb=short -s

      - name: Upload artifacts (screenshots + videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-admin-${{ github.run_id }}
          path: |
            tests/e2e/admin_ui/screenshots/
            test-results/videos/admin/
          retention-days: 7

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-admin
          path: results/tm03.xml

  # ── Job 3: TM-04 Auth boundary (wrong user cannot accept) ─────────────────
  team-e2e-auth:
    name: "TM-04 Wrong user cannot accept invite (auth boundary)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_intern_system
          SECRET_KEY=ci-team-e2e-secret-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          ADMIN_NAME=CI Admin
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
