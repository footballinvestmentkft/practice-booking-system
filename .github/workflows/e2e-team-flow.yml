name: E2E Team Flow (Captain / Admin / Auth)

on:
  pull_request:
    branches: [main, develop, "feature/*", "feat/*", "fix/*", "refactor/*"]
    paths:
      - 'app/**'
      - 'tests/e2e/admin_ui/test_team_flow_e2e.py'
      - 'tests/e2e/admin_ui/test_team_golden_flow.py'
      - '.github/workflows/e2e-team-flow.yml'
  workflow_dispatch:

concurrency:
  group: e2e-team-${{ github.ref }}
  cancel-in-progress: true

# ── Reusable environment block ────────────────────────────────────────────────
env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lfa_intern_system
  SECRET_KEY: ci-team-e2e-secret-key-not-for-production
  API_URL: http://localhost:8000
  PYTEST_HEADLESS: "true"
  ADMIN_EMAIL: admin@lfa.com
  ADMIN_PASSWORD: admin123

jobs:
  # ── Job 1: TM-01 Captain create+invite+accept / TM-02 zero-credit error ──
  team-e2e-captain:
    name: "TM-01 Captain+Invitee full flow / TM-02 0-credit error"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfa_intern_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lfa_intern_system
          SECRET_KEY=ci-team-e2e-secret-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ADMIN_EMAIL=admin@lfa.com
          ADMIN_PASSWORD=admin123
          ADMIN_NAME=CI Admin
          ENABLE_RATE_LIMITING=false
          EOF

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          python -m playwright install chromium

      - name: Run DB migrations
        run: alembic upgrade head

      - name: Seed test data
        run: |
          python scripts/seed_e2e_users.py
          python scripts/seed_tournament_types.py

      - name: Start backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'

      - name: TM-01 + TM-02 (Captain + Invitee + 0-credit edge)
        env:
          PLAYWRIGHT_VIDEO_DIR: test-results/videos/captain
        run: |
          mkdir -p results test-results/videos/captain
          PYTHONPATH=. pytest tests/e2e/admin_ui/test_team_flow_e2e.py \
            -k "test_e2e_team_01_full_create_invite_accept_flow or test_e2e_team_02_zero_credits_shows_error" \
            --junitxml=results/tm01_tm02.xml \
            -v --tb=short -s

      - name: Upload artifacts (screenshots + videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-captain-${{ github.run_id }}
          path: |
            tests/e2e/admin_ui/screenshots/
            test-results/videos/captain/
          retention-days: 7

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-captain
          path: results/tm01_tm02.xml

  # ── Job 2: TM-03 Admin bypass (no invite required) ────────────────────────
  team-e2e-admin:
    name: "TM-03 Admin bypass add member (no invite)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
