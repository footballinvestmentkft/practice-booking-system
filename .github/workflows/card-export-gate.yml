name: Card Export Gate

# ── Purpose ────────────────────────────────────────────────────────────────────
# Validates the player card PNG export endpoint:
#   - Platform whitelist validation (valid → 200, invalid → 422, default → 422)
#   - Auth + ownership (student own card OK, student other card → 403, admin → 200)
#   - Rate limiting (6th request → 429)
#   - Error handling (Playwright timeout → 504)
#   - PNG output: magic bytes, correct dimensions per platform
#   - Playwright/Chromium binary smoke test (browser can launch + screenshot)
#
# No DB required — get_db and get_current_user_web are mocked via
# FastAPI dependency_overrides. _sync_take_screenshot is mocked with
# fixture PNGs; only the chromium smoke test launches a real browser.
#
# Runtime: < 90 s on cold runner (Playwright install ~40 s, tests ~15 s).
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/api/web_routes/public_player.py'
      - 'app/api/web_routes/dashboard.py'
      - 'app/services/card_export_service.py'
      - 'app/services/card_platform_service.py'
      - 'app/config.py'
      - 'app/templates/public/export/**'
      - 'tests/unit/test_card_export.py'
      - 'tests/unit/test_card_export_video.py'
      - 'tests/unit/test_platform_export_layout.py'
      - '.github/workflows/card-export-gate.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/api/web_routes/public_player.py'
      - 'app/api/web_routes/dashboard.py'
      - 'app/services/card_export_service.py'
      - 'app/services/card_platform_service.py'
      - 'app/config.py'
      - 'app/templates/public/export/**'
      - 'tests/unit/test_card_export.py'
      - 'tests/unit/test_card_export_video.py'
      - 'tests/unit/test_platform_export_layout.py'
      - '.github/workflows/card-export-gate.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'manual verification'

concurrency:
  group: card-export-${{ github.ref }}
  cancel-in-progress: true

jobs:
  card-export-gate:
    name: Card Export Gate (PNG export + Playwright smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Install Playwright Chromium binary
        run: python -m playwright install chromium --with-deps

      - name: Install FFmpeg (required for MP4 post-processing)
        run: sudo apt-get install -y ffmpeg

      - name: Write minimal .env (no DB needed — deps are mocked)
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://ci:ci@localhost:5432/ci_db
          SECRET_KEY=ci-card-export-gate-key-not-for-production
          ENVIRONMENT=test
          TESTING=true
          DEBUG=false
          ENABLE_RATE_LIMITING=false
          APP_INTERNAL_PORT=8000
          EOF

      - name: Run card export unit tests
        run: |
          PYTHONPATH=. pytest tests/unit/test_card_export.py \
                              tests/unit/test_card_export_video.py \
                              tests/unit/test_platform_export_layout.py \
            -v --tb=short -ra \
            --durations=10 \
            -m unit

      - name: Gate summary
        if: always()
        run: |
          echo "══════════════════════════════════════════════════════════"
          echo " Card Export Gate — Summary"
          echo "══════════════════════════════════════════════════════════"
          echo ""
          echo " Happy path"
          echo "   EX-01..05  all 5 platforms → 200 image/png"
          echo "   EX-06      missing platform → default square → 200"
          echo "   EX-12      admin exports any player → 200"
          echo ""
          echo " Validation"
          echo "   EX-07      invalid platform → 422"
          echo "   EX-08      'default' platform → 422 (not an export target)"
          echo "   EX-09      player not found → 404"
          echo "   EX-10      no active LFA license → 404"
          echo "   EX-11      student exports other player → 403"
          echo ""
          echo " Response headers"
          echo "   EX-13      Content-Disposition filename correct"
          echo "   EX-14      Cache-Control: no-store"
          echo "   content-type: image/png"
          echo ""
          echo " PNG output"
          echo "   EX-17      dimensions: square=1080x1080, landscape=1920x1080, story=1080x1920"
          echo "   EX-18      PNG magic bytes \\x89PNG"
          echo "   EX-19      player without photo → still returns PNG"
          echo ""
          echo " Error paths"
          echo "   EX-15      Playwright timeout → 504"
          echo "   EX-16      rate limit (6th request) → 429"
          echo ""
          echo " Playwright environment"
          echo "   chromium_can_launch_and_screenshot → browser launches, 200x200 PNG OK"
          echo ""
          echo " Video export — FIFA × Square (WebM)"
          echo "   VX-01  fifa + instagram_square → 200 video/webm"
          echo "   VX-02  fifa + instagram_portrait → 422 (not animated capable)"
          echo "   VX-03  compact + instagram_square → 422"
          echo "   VX-04  invalid platform → 422"
          echo "   VX-05  platform=default → 422"
          echo "   VX-06  student exports other player → 403"
          echo "   VX-07  admin exports any player → 200"
          echo "   VX-08  video rate limit: 3rd request → 429 (limit=2)"
          echo "   VX-09  recording timeout → 504"
          echo "   VX-10  player not found → 404"
          echo "   VX-11  no active LFA license → 404"
          echo "   VX-12  WebM magic bytes in response"
          echo "   VX-13  PNG render_url never contains animated=1"
          echo "   VX-14  unsupported format (avi) → 422"
          echo "   VX-15  unsupported duration → 422"
          echo "   VX-16  Content-Disposition + Cache-Control headers correct"
          echo "   VX-17  is_animated_capable() → True for fifa+sq and pulse+sq only"
          echo "   VX-18  registry: exactly {(fifa,sq),(pulse,sq)}"
          echo ""
          echo " Video export — Pulse × Square (WebM)"
          echo "   VX-19  pulse + instagram_square → 200 video/webm"
          echo "   VX-20  pulse + instagram_portrait → 422"
          echo "   VX-21  pulse + instagram_story → 422"
          echo ""
          echo " Video export — MP4 (H.264/AAC via FFmpeg)"
          echo "   VX-22  format=mp4 → 200 video/mp4 (FFmpeg mocked)"
          echo "   VX-23  MP4 bytes[4:8] == ftyp (ISO Base Media magic)"
          echo "   VX-24  FFmpeg failure → 200 webm fallback + X-Export-Fallback: ffmpeg-failed"
          echo "   VX-25  format=avi → 422 (avi not in _SUPPORTED_VIDEO_FORMATS)"
          echo "   VX-26  _sync_record_video has HTTP ≥400 guard (raises CardVideoRecordError)"
          echo ""
          echo " Animated template isolation — FIFA × Square"
          echo "   EX-32  square/fifa.html source has animated_mode branch"
          echo "   EX-33  animated=True → @keyframes present"
          echo "   EX-34  animated=False → no @keyframes"
          echo "   EX-35  static layout intact (ex-bar-fill present)"
          echo ""
          echo " Animated template isolation — Pulse × Square"
          echo "   EX-36  square/pulse.html source has animated_mode branch"
          echo "   EX-37  animated=True → @keyframes present"
          echo "   EX-38  animated=False → no @keyframes"
          echo "   EX-39  static layout intact (pex-bar-fill present)"
          echo "   EX-40  dedicated pex-card template used (no card-wrap / tab-bar)"
          echo ""
          echo " Security invariants:"
          echo "   render_url built server-side from int user_id + whitelist platform only"
          echo "   'default' preset has no canvas size → 422 before Playwright is called"
          echo "   rate_key = user_id:client_ip — per-user+IP, not global"
          echo "══════════════════════════════════════════════════════════"
