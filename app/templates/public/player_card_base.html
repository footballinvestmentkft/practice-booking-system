<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ player.name }} — LFA Player Card</title>
    <meta property="og:title" content="{{ player.name }} — LFA Player Card">
    <meta property="og:description" content="{{ player.position }} · {{ player.nationality | nationalities_display(player.secondary_nationality) }} · {{ tier_label }} {{ overall }}">

/* ── CSS custom properties (theme defaults = "default" / Slate) ──────────── */

    --card-bar-bg:    rgba(255,255,255,0.08);
    --card-bar-neutral: rgba(255,255,255,0.12);
    --card-cat-bg:    rgba(255,255,255,0.04);
    --card-tab-border: rgba(255,255,255,0.08);
    --card-ev-border: rgba(255,255,255,0.05);
    /* Text colour tokens — override in light themes */
    --card-text-primary:   rgba(255,255,255,0.88);
    --card-text-secondary: rgba(255,255,255,0.60);
    --card-text-muted:     rgba(255,255,255,0.40);

    --card-badge-cr-bg:   rgba(72,187,120,0.15);

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--card-page-bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 0.75rem 4rem;
    color: var(--card-body-text);
    overflow-x: hidden;
    width: 100%;
}
.page-brand {
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--card-text-faint);
    margin-bottom: 1.25rem; text-align: center;
}

/* ── Platform preset overrides — PREVIEW mode (card editor iframe) ───────── */
/* Applied via body.platform-* CSS class when ?export=1 is NOT set.          */
/* Constrains the card-wrap to an aspect-ratio preview box inside the editor. */
.platform-instagram-square .card-wrap,
.platform-facebook-square .card-wrap  { width: min(400px, 100vw); max-width: none; aspect-ratio: 1/1; overflow: hidden; }
.platform-instagram-portrait .card-wrap { width: min(360px, 100vw); max-width: none; aspect-ratio: 4/5; overflow: hidden; }
.platform-instagram-story .card-wrap,
.platform-tiktok .card-wrap           { width: min(260px, 100vw); max-width: none; aspect-ratio: 9/16; overflow: hidden; }
.platform-facebook-landscape .card-wrap,
.platform-og .card-wrap               { width: min(600px, 100vw); max-width: none; aspect-ratio: 1.91/1; overflow: hidden; }
.platform-banner-custom .card-wrap    { width: min(720px, 100vw); max-width: none; aspect-ratio: 3/1; overflow: hidden; }

/* ── Sprint A: Export canvas fill ────────────────────────────────────────── */
/* .export-mode is added by the route only when ?export=1.                   */
/* The Playwright viewport is set to the exact canvas size; body + card-wrap  */
/* must fill it completely so the screenshot clip captures the full card.     */
body.export-mode {
    padding: 0;
    margin: 0;
    align-items: stretch;
    justify-content: flex-start;
    overflow: hidden;
}
body.export-mode .page-brand { display: none; }
body.export-mode .card-wrap {
    width: 100vw !important;
    height: 100vh !important;
    max-width: none !important;
    border-radius: 0;
    overflow: hidden;
}

/* ── Sprint B: Deterministic export content ─────────────────────────────── */
/* Tab bar is interactive UI — not needed in static PNG export.              */
/* Skills section is primary; events section is suppressed in export.        */
body.export-mode .tab-bar        { display: none !important; }
body.export-mode .skills-section { display: block !important; }
body.export-mode .events-section { display: none !important; }

/* ── Sprint C: Landscape layout (LANDSCAPE strategy) ────────────────────── */
/* card-wrap switches to row flex; variant templates split left/right panels. */
body.export-mode.platform-facebook-landscape .card-wrap,
body.export-mode.platform-og .card-wrap {
    flex-direction: row;
    align-items: stretch;
}

/* ── Sprint D: Banner layout (BANNER strategy) ───────────────────────────── */
/* card-wrap row flex; skills hidden — only the identity header is shown.    */
body.export-mode.platform-banner-custom .card-wrap {
    flex-direction: row;
    align-items: stretch;
}
body.export-mode.platform-banner-custom .skills-section { display: none !important; }

/* ── P0: Export scaling — CSS custom properties ──────────────────────────── */
/* Strictly scoped to body.export-mode; editor preview is unaffected.        */
body.export-mode {
    --ex-font-ovr:    clamp(3rem, 7vw, 10rem);
    --ex-font-name:   clamp(1.5rem, 3.5vw, 5rem);
    --ex-font-meta:   clamp(0.7rem, 1.1vw, 1.4rem);
    --ex-font-skill:  clamp(0.75rem, 1.1vw, 1.5rem);
    --ex-photo-w:     clamp(180px, 28vw, 440px);
    --ex-avatar-w:    clamp(80px, 10vw, 200px);
}
/* Story / TikTok: 1080×1920 — tall canvas, larger type relative to 9:16 width */
body.export-mode.platform-instagram-story,
body.export-mode.platform-tiktok {
    --ex-font-ovr:   clamp(5rem, 9vw, 11rem);
    --ex-font-name:  clamp(2.5rem, 5vw, 6rem);
    --ex-font-meta:  clamp(0.9rem, 1.5vw, 1.8rem);
    --ex-font-skill: clamp(0.9rem, 1.4vw, 1.8rem);
    --ex-photo-w:    clamp(220px, 35vw, 500px);
    --ex-avatar-w:   clamp(120px, 14vw, 260px);
}
/* Landscape: 1200×630 — moderate scale, photo column is layout-determined */
body.export-mode.platform-facebook-landscape,
body.export-mode.platform-og {
    --ex-font-ovr:   clamp(2.5rem, 5.5vw, 7rem);
    --ex-font-name:  clamp(1.2rem, 2.5vw, 3.5rem);
    --ex-font-meta:  clamp(0.6rem, 0.9vw, 1.2rem);
    --ex-font-skill: clamp(0.65rem, 0.9vw, 1.2rem);
    --ex-photo-w:    clamp(140px, 22vw, 320px);
    --ex-avatar-w:   clamp(60px, 7vw, 140px);
}
/* Banner: 1500×500 — wide horizontal strip */
body.export-mode.platform-banner-custom {
    --ex-font-ovr:  clamp(3rem, 6vw, 8rem);
    --ex-font-name: clamp(1.5rem, 3vw, 4rem);
    --ex-font-meta: clamp(0.65rem, 1vw, 1.3rem);
    --ex-photo-w:   clamp(120px, 15vw, 280px);
    --ex-avatar-w:  clamp(60px, 8vw, 160px);
}
/* Remove skill bar max-width constraint so bars fill available column width */
body.export-mode .skill-bar-bg { max-width: none !important; }

{% block extra_styles %}{% endblock %}
</style>
</head>
<body class="theme-{{ card_theme }}{% if platform_class %} {{ platform_class }}{% endif %}{% if export_mode %} export-mode{% endif %}{% block extra_body_classes %}{% endblock %}">

{% block page_header %}<div class="page-brand">⚽ LFA Education Center — Player Card</div>{% endblock %}

{% block content %}{% endblock %}

{% block scripts %}{% endblock %}

</body>
</html>
