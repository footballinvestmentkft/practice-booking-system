{%- from "macros/card_theme_root.html" import export_root_vars -%}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ player.name }} — LFA Player Card</title>
<style>
/*
 * Shared Export Base Template
 * Provides: HTML shell, CSS reset, theme-root block, shared skill-row CSS classes.
 * All CSS sizing values are parameterized via CSS custom properties.
 * Platforms extend this template (directly or via fifa_base_column.html) and
 * override only the blocks they need.
 *
 * Block API:
 *   theme_root       — export_root_vars(theme) call; override to change cat_bg/bar_bg
 *   platform_vars    — :root {} block for platform sizing vars (--ex-hero-h, etc.)
 *   extra_css        — platform-specific CSS (hero zone, panel layouts, unique classes)
 *   body_content     — full DOM structure
 *   scripts          — JS (default empty; square overrides for scale engine)
 *
 * CSS var defaults (match portrait — the column-archetype reference platform):
 *   --ex-card-direction  column       flex-direction of .ex-card
 *   --ex-grid-gap        12px         gap between 2×2 skill-category cells
 *   --ex-cat-radius      12px         border-radius of .ex-cat
 *   --ex-cat-pad         14px         padding of .ex-cat
 *   --ex-font-cat        13px         font-size of .ex-cat-name
 *   --ex-row-max-h       44px         max-height of .ex-row (caps Set Pieces stretch)
 *   --ex-sname-w         160px        flex-basis of .ex-sname (skill name column)
 *   --ex-font-skill      15px         font-size of .ex-sname and .ex-sval
 *   --ex-bar-h           8px          height of .ex-bar-bg (skill bar track)
 *   --ex-sval-w          44px         flex-basis of .ex-sval (skill value column)
 *   --ex-trend-w         18px         flex-basis of .ex-trend (arrow column)
 *   --ex-font-trend      14px         font-size of .ex-trend
 */

/* ── THEME ROOT — CSS custom properties from export_root_vars macro ─────────
   Emits: --ex-panel-bg, --ex-body-bg, --ex-accent, --ex-bar-bg, --ex-cat-bg,
          --ex-text-strong, --ex-text-body, --ex-text-secondary, --ex-text-muted
   To pass a custom cat_bg, override the theme_root block in the child template.
   ─────────────────────────────────────────────────────────────────────────── */
{% block theme_root %}{{ export_root_vars(theme) }}{% endblock %}

/* ── PLATFORM SIZING VARS — override in child to set --ex-hero-h, etc. ────── */
{% block platform_vars %}{% endblock %}

/* ── RESET ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

/* ── ROOT CARD ───────────────────────────────────────────────────────────────
   100vw × 100vh, flex layout.
   Horizontal platforms (landscape, banner) set --ex-card-direction: row.
   Square overrides .ex-card entirely in extra_css for min(100vw,100vh) sizing.
   ─────────────────────────────────────────────────────────────────────────── */
.ex-card {
    width:  100vw;
    height: 100vh;
    display: flex;
    flex-direction: var(--ex-card-direction, column);
    overflow: hidden;
}

/* ── 2×2 SKILL CATEGORY GRID ─────────────────────────────────────────────── */
.ex-skill-cats {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: var(--ex-grid-gap, 12px);
    overflow: hidden;
    min-height: 0;
}

/* ── SKILL ROW CONTAINER ─────────────────────────────────────────────────── */
.ex-skill-rows {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
}

/* ── CATEGORY CELL ───────────────────────────────────────────────────────── */
.ex-cat {
    background: var(--ex-cat-bg);
    border-radius: var(--ex-cat-radius, 12px);
    padding: var(--ex-cat-pad, 14px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
}
.ex-cat-name {
    flex-shrink: 0;
    font-size: var(--ex-font-cat, 13px);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.10em;
    color: var(--ex-text-secondary);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* ── INDIVIDUAL SKILL ROW ────────────────────────────────────────────────── */
.ex-row {
    flex: 1;
    min-height: 0;
    max-height: var(--ex-row-max-h, 44px);
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Skill name column */
.ex-sname {
    flex: 0 0 var(--ex-sname-w, 160px);
    font-size: var(--ex-font-skill, 15px);
    font-weight: 500;
    color: var(--ex-text-body);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1;
}

/* Skill bar track */
.ex-bar-bg {
    flex: 1;
    min-width: 0;
    height: var(--ex-bar-h, 8px);
    background: var(--ex-bar-bg);
    border-radius: 4px;
    overflow: hidden;
}
.ex-bar-fill {
    height: 100%;
    border-radius: 4px;
    min-width: 4px;
}

/* Skill value column */
.ex-sval {
    flex: 0 0 var(--ex-sval-w, 44px);
    font-size: var(--ex-font-skill, 15px);
    font-weight: 700;
    text-align: right;
    line-height: 1;
}

/* Trend arrow column */
.ex-trend {
    flex: 0 0 var(--ex-trend-w, 18px);
    font-size: var(--ex-font-trend, 14px);
    font-weight: 900;
    text-align: center;
    line-height: 1;
}

/* ── PLATFORM-SPECIFIC CSS ───────────────────────────────────────────────── */
{% block extra_css %}{% endblock %}
</style>
</head>
<body>
{% block body_content %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
